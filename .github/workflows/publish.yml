name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch: # Re-run publish after JSR package/repo linking without an empty commit

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Publish to JSR
        run: npx jsr publish
