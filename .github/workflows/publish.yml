name: Publish

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch: # Re-run publish after JSR package/repo linking without an empty commit

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: latest

      - name: Publish to JSR
        run: deno publish
